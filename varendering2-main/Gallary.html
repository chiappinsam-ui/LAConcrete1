<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VA Rendering | Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* ====================================================================================================
           1. CORE SETTINGS
           ==================================================================================================== */
        :root {
            --primary-orange: #FF5722;
            --bg-deep: #050505;
            --header-height: 90px;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
            --ease-smooth: cubic-bezier(0.23, 1, 0.32, 1);
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            outline: none;
            scrollbar-width: none; 
        }
        *::-webkit-scrollbar { display: none; }

        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Montserrat', sans-serif;
            
            /* Sleek Dark Charcoal Gradient */
            background: radial-gradient(circle at center, #181818 0%, #020202 100%);
            
            overflow: hidden; 
            position: fixed; inset: 0;
        }

        a { text-decoration: none; color: inherit; transition: 0.3s; }
        ul { list-style: none; }
        
        /* High Performance Image Rendering */
        img, video { 
            display: block; width: 100%; height: 100%; object-fit: cover; 
            transform: scale(1.6); /* High zoom for parallax */
            will-change: transform;
            pointer-events: none;
        }

        /* ====================================================================================================
           2. 3D CINEMATIC LOADER (BIG & BOLD)
           ==================================================================================================== */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 99999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.2s var(--ease-smooth), visibility 1.2s;
            perspective: 1200px;
        }
        
        .loader-content {
            position: relative;
            transform-style: preserve-3d;
            perspective: 800px;
            text-align: center;
        }

        .loader-text {
            /* BIGGER FONT SIZE: Match Services Page exactly */
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
            display: flex; gap: 15px;
            justify-content: center;
            opacity: 0;
            transform-origin: center top;
            animation: intro3D 2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            white-space: nowrap;
        }

        .loader-text .brand-accent { 
            color: var(--primary-orange); 
            text-shadow: 0 0 50px rgba(255, 87, 34, 0.8);
            transform: translateZ(20px);
        }
        .loader-text .rendering { color: white; }
        
        .loader-bar {
            width: 0%; height: 4px; background: var(--primary-orange);
            margin-top: 30px;
            box-shadow: 0 0 25px var(--primary-orange);
            border-radius: 2px;
            animation: loadBar 1.5s ease-in-out forwards 0.3s;
        }

        @keyframes intro3D {
            0% { opacity: 0; transform: rotateX(80deg) translateY(100px) scale(0.8); filter: blur(20px); letter-spacing: 20px; }
            100% { opacity: 1; transform: rotateX(0deg) translateY(0) scale(1); filter: blur(0); letter-spacing: 2px; }
        }

        @keyframes loadBar {
            0% { width: 0%; opacity: 0; }
            40% { width: 100%; opacity: 1; }
            80% { width: 100%; opacity: 1; transform: scaleY(1); }
            100% { width: 100%; opacity: 0; transform: scaleY(0); }
        }

        .loader-hidden { opacity: 0; visibility: hidden; pointer-events: none; }

        /* ====================================================================================================
           3. NAVIGATION BAR
           ==================================================================================================== */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); z-index: 1000;
            background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .container-nav { width: 100%; max-width: 1800px; margin: 0 auto; height: 100%; padding: 0 40px; display: flex; align-items: center; justify-content: space-between; }
        
        .logo a { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: #fff; display: flex; align-items: center; gap: 15px; }
        .logo .va { color: var(--primary-orange); }
        .nav-logo { height: 35px; width: auto; margin-right: 12px; filter: invert(1) hue-rotate(180deg) brightness(1.2); mix-blend-mode: screen; }

        nav { display: flex; align-items: center; }
        nav ul { display: flex; gap: 40px; }
        nav ul li a { font-weight: 700; text-transform: uppercase; font-size: 0.8rem; color: #aaa; padding: 10px 0; }
        nav ul li a:hover, nav ul li a.active { color: #fff; }

        .mobile-nav-toggle { display: none; width: 30px; height: 20px; cursor: pointer; z-index: 2000; }
        .mobile-nav-toggle span { display: block; width: 100%; height: 2px; background: #fff; margin-bottom: 6px; transition: 0.3s; }

        /* ====================================================================================================
           4. GALLERY ENGINE (DESKTOP)
           ==================================================================================================== */
        .gallery-viewport {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
            display: flex; align-items: center; 
            perspective: 1200px; /* Deep 3D */
            overflow: hidden;
        }

        .gallery-track {
            display: flex;
            gap: 0; 
            padding-left: 50vw; padding-right: 50vw; /* Center start */
            will-change: transform;
            height: 100%;
            align-items: center;
            transform-style: preserve-3d;
        }

        .gallery-card {
            position: relative;
            width: 40vh; height: 60vh;
            flex-shrink: 0;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            
            /* Performance hints */
            will-change: transform, opacity, filter;
            transform-origin: center center;
            margin: 0 40px; 
            
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* Number Tag */
        .card-num {
            position: absolute; bottom: -80px; left: 50%; transform: translateX(-50%);
            font-size: 12rem; font-weight: 900; color: transparent;
            -webkit-text-stroke: 2px rgba(255, 255, 255, 0.05);
            z-index: -1; pointer-events: none; transition: 0.3s;
        }
        .gallery-card.is-active .card-num {
            -webkit-text-stroke: 2px var(--primary-orange);
            opacity: 0.4;
        }

        /* ====================================================================================================
           5. FOOTER HINT
           ==================================================================================================== */
        .scroll-footer {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            z-index: 100; pointer-events: none; text-align: center;
        }
        .scroll-text {
            font-size: 0.7rem; text-transform: uppercase; letter-spacing: 3px; color: #666;
            margin-bottom: 10px; display: block;
        }
        .scroll-line {
            width: 1px; height: 40px; background: rgba(255,255,255,0.1); margin: 0 auto; position: relative; overflow: hidden;
        }
        .scroll-line::after {
            content: ''; position: absolute; inset: 0; background: var(--primary-orange);
            animation: drop 1.5s infinite;
        }
        @keyframes drop { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        /* ====================================================================================================
           6. MOBILE OPTIMIZATION
           ==================================================================================================== */
        @media (max-width: 992px) {
            
            /* Keep Loader Big but Tighter */
            .loader-text {
                font-size: 2.2rem; /* Force Big Size */
                letter-spacing: 1px; /* Tighten spacing to make it fit */
                gap: 8px; 
            }

            /* Nav Spacing Fix */
            .container-nav { justify-content: space-between; padding: 0 20px; }
            .logo a { font-size: 1.2rem; gap: 8px; }
            .nav-logo { height: 28px; margin-right: 8px; }
            
            nav { 
                position: fixed; top: 0; right: -100%; width: 100%; height: 100vh;
                background: #000; flex-direction: column; justify-content: center;
                transition: 0.3s; z-index: 1500;
            }
            body.nav-open nav { right: 0; }
            nav ul { flex-direction: column; gap: 30px; }
            
            .mobile-nav-toggle { display: block; }
            body.nav-open .mobile-nav-toggle span:nth-child(1) { transform: rotate(45deg) translate(5px, 6px); }
            body.nav-open .mobile-nav-toggle span:nth-child(2) { opacity: 0; }
            body.nav-open .mobile-nav-toggle span:nth-child(3) { transform: rotate(-45deg) translate(5px, -6px); }

            /* Mobile Gallery: Simple, Snappy, No Lag */
            .gallery-viewport { 
                position: absolute; inset: 0; 
                overflow-x: scroll; overflow-y: hidden; 
                -webkit-overflow-scrolling: touch; 
                display: flex; align-items: center; perspective: none;
                scroll-snap-type: x mandatory; scroll-padding: 0 50%;
            }
            
            .gallery-track { 
                padding: 0 50vw; height: 100%; 
                display: flex; align-items: center; width: max-content; gap: 20px; 
                transform: none !important; 
            }
            
            .gallery-card { 
                width: 85vw; height: 65vh; margin: 0;
                opacity: 1 !important; filter: none !important; transform: none !important; 
                border-color: rgba(255,255,255,0.2);
                scroll-snap-align: center; scroll-snap-stop: always;
            }
            
            .card-num { display: none; }
            img, video { transform: scale(1); } 
            .scroll-footer { display: none; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-content">
            <div class="loader-text">
                <span class="va brand-accent">VA</span><span class="rendering">RENDERING</span>
            </div>
            <div class="loader-bar"></div>
        </div>
    </div>

    <header>
        <div class="container-nav">
            <div class="logo">
                <a href="index.html">
                    <img src="images/logo.png" alt="Logo" class="nav-logo" onerror="this.style.display='none'">
                    <span><span style="color:#FF5722">VA</span>Rendering</span>
                </a>
            </div>
            
            <nav id="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="Gallary.html" class="active">Gallery</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>

            <div class="mobile-nav-toggle" id="nav-toggle">
                <span></span><span></span><span></span>
            </div>
        </div>
    </header>

    <div class="gallery-viewport">
        <div class="gallery-track" id="track">
            
            <div class="gallery-card">
                <img src="images/vinny1.png" alt="Project">
                <div class="card-num">01</div>
            </div>

            <div class="gallery-card">
                <video src="images/vinny12.MOV" autoplay loop muted playsinline preload="metadata"></video>
                <div class="card-num">02</div>
            </div>

            <div class="gallery-card">
                <img src="images/vinny2.png" alt="Project">
                <div class="card-num">03</div>
            </div>

            <div class="gallery-card">
                <img src="images/vinny3.png" alt="Project">
                <div class="card-num">04</div>
            </div>

            <div class="gallery-card">
                <img src="images/vinny4.png" alt="Project">
                <div class="card-num">05</div>
            </div>

            <div class="gallery-card">
                <img src="images/vinny5.png" alt="Project">
                <div class="card-num">06</div>
            </div>

            <div class="gallery-card">
                <img src="images/vinny6.png" alt="Project">
                <div class="card-num">07</div>
            </div>

            <div class="gallery-card">
                <img src="images/vinny7.png" alt="Project">
                <div class="card-num">08</div>
            </div>

        </div>
    </div>

    <div class="scroll-footer">
        <span class="scroll-text">Scroll / Drag</span>
        <div class="scroll-line"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            
            // --- 1. LOADER (EXACT MATCH SERVICES) ---
            const loader = document.getElementById('loader');
            setTimeout(() => {
                loader.classList.add('loader-hidden');
            }, 2500);

            // --- 2. MOBILE NAV LOGIC (MATCHING SERVICES) ---
            const navToggle = document.getElementById('nav-toggle');
            if(navToggle) {
                navToggle.addEventListener('click', () => {
                    document.body.classList.toggle('nav-open');
                });
            }
            // Close nav on click
            document.querySelectorAll('nav a').forEach(l => l.addEventListener('click', () => document.body.classList.remove('nav-open')));

            // --- 3. GALLERY ENGINE (DESKTOP ONLY) ---
            const track = document.getElementById('track');
            const isDesktop = window.innerWidth > 992;

            if (track && isDesktop) {
                // Triple Clone for Infinite Loop
                const originalCards = Array.from(track.children);
                originalCards.forEach(card => track.appendChild(card.cloneNode(true)));
                originalCards.forEach(card => track.appendChild(card.cloneNode(true)));

                const allCards = Array.from(track.children);
                let sequenceWidth = track.scrollWidth / 3;
                let currentScroll = sequenceWidth; 
                let targetScroll = sequenceWidth;
                let velocity = 0;

                // Handle Window Resize
                const recalc = () => {
                    sequenceWidth = track.scrollWidth / 3;
                    currentScroll = sequenceWidth;
                    targetScroll = sequenceWidth;
                };
                window.addEventListener('resize', () => { if(window.innerWidth > 992) recalc(); });

                // Mouse Wheel Physics
                window.addEventListener('wheel', (e) => {
                    targetScroll += e.deltaY * 2.0; 
                }, { passive: true });

                // Animation Loop
                function animate() {
                    // Smooth Physics
                    velocity = (targetScroll - currentScroll) * 0.06;
                    currentScroll += velocity;

                    // Infinite Scroll Wrap Logic
                    if (currentScroll < 0) {
                        currentScroll += sequenceWidth;
                        targetScroll += sequenceWidth;
                    } else if (currentScroll > sequenceWidth * 2) {
                        currentScroll -= sequenceWidth;
                        targetScroll -= sequenceWidth;
                    }

                    // Move Track
                    track.style.transform = `translateX(${-currentScroll + (window.innerWidth/2)}px)`; 

                    // "Sick" Card Effects
                    const screenCenter = window.innerWidth / 2;
                    
                    allCards.forEach(card => {
                        const rect = card.getBoundingClientRect();
                        const cardCenter = rect.left + (rect.width / 2);
                        const distFromCenter = cardCenter - screenCenter;
                        const normDist = distFromCenter / (window.innerWidth / 2); 
                        const absNormDist = Math.abs(normDist);

                        // EFFECT A: 3D Rotation (Arch Effect)
                        const rotateY = normDist * 45; 
                        const translateZ = absNormDist * -300; 
                        
                        // EFFECT B: Velocity Skew (Warp speed effect)
                        const skew = Math.max(-15, Math.min(15, velocity * 0.25));
                        
                        // EFFECT C: Focus (Fade edges)
                        let opacity = 1 - (absNormDist * 0.5); 
                        opacity = Math.max(0.2, opacity);
                        
                        // EFFECT D: Deep Parallax Image
                        const img = card.querySelector('img, video');
                        const parallax = distFromCenter * 0.35; 

                        // Apply
                        card.style.transform = `
                            perspective(1000px)
                            translateX(${normDist * -20}px) 
                            translateZ(${translateZ}px) 
                            rotateY(${rotateY}deg) 
                            skewX(${-skew}deg)
                        `;
                        
                        card.style.opacity = opacity;
                        
                        // Grayscale edges
                        const grayscale = Math.min(1, absNormDist); 
                        const brightness = 1 - (absNormDist * 0.7); 
                        card.style.filter = `grayscale(${grayscale}) brightness(${brightness})`;

                        if(img) {
                            img.style.transform = `scale(1.6) translateX(${parallax}px)`;
                        }

                        // Active Class for Number reveal
                        if(Math.abs(distFromCenter) < 200) {
                            card.classList.add('is-active');
                            card.style.zIndex = 10;
                        } else {
                            card.classList.remove('is-active');
                            card.style.zIndex = 1;
                        }
                    });

                    requestAnimationFrame(animate);
                }
                animate();
            }
        });
    </script>
</body>
</html>
